<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генеалогическое древо</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: var(--tg-theme-font-family, sans-serif);
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 16px;
            width: 100%;
            max-width: 300px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        /**
         * <p>Утилита для безопасной проверки объектов на null и undefined.</p>
         * <p>Реализует паттерн защитного программирования для предотвращения ошибок TypeError в среде выполнения без строгой типизации.</p>
         *
         * @param value {@code Object} проверяемое значение
         * @return {@code boolean} истина, если значение отсутствует
         */
        function isNullOrUndefined(value) {
            if (value === null || value === undefined) {
                return true;
            }
            return false;
        }

        /**
         * <p>Генерирует и монтирует DOM-узлы для карточки персоны.</p>
         * <p>Прямая манипуляция DOM выбрана для отказа от тяжелых фреймворков и минимизации времени загрузки (TTI) в условиях мобильного интернета.</p>
         *
         * @param containerId {@code String} идентификатор корневого узла
         * @param personData {@code Object} модель данных персоны
         * @return {@code void}
         */
        function renderPersonCard(containerId, personData) {
            const container = document.getElementById(containerId);
            
            if (isNullOrUndefined(container)) {
                console.error("Критическая ошибка: Корневой контейнер не найден в DOM");
                return;
            }

            const card = document.createElement("div");
            card.className = "card";
            
            const nameNode = document.createElement("h3");
            nameNode.textContent = personData.fullName;
            
            const yearNode = document.createElement("p");
            if (isNullOrUndefined(personData.birthYear)) {
                yearNode.textContent = "Год рождения: неизвестно";
            } else {
                yearNode.textContent = "Год рождения: " + personData.birthYear;
            }

            const actionButton = document.createElement("button");
            actionButton.textContent = "Показать предков";
            
            actionButton.onclick = function() {
                if (!isNullOrUndefined(window.Telegram.WebApp)) {
                    // Использование нативного UI мессенджера для обратной связи
                    window.Telegram.WebApp.showAlert("Запрос ветки для ID: " + personData.id);
                    // Здесь в будущем будет отправка данных на бэкенд: window.Telegram.WebApp.sendData(personData.id)
                }
            };

            card.appendChild(nameNode);
            card.appendChild(yearNode);
            card.appendChild(actionButton);
            
            container.appendChild(card);
        }

        // Инициализация среды мессенджера
        const tg = window.Telegram.WebApp;
        tg.ready(); // Сообщает мессенджеру, что приложение готово к отображению
        tg.expand(); // Разворачивает окно на всю высоту экрана

        // Моковые данные для демонстрации
        const activePerson = {
            id: "node-123",
            fullName: "Алексей Смирнов",
            birthYear: 1965
        };

        renderPersonCard("app", activePerson);
    </script>
</body>
</html>
